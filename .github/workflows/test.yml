name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: unittest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        # Run from the parent of the checkout so tinyapi/ is importable as a package
        # without an install step — same as local:
        # python -m unittest discover -s tinyapi/tests -t .
        working-directory: ${{ github.workspace }}/..
        run: python -m unittest discover -s tinyapi/tests -t . -v
